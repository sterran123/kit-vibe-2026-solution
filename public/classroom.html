<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TutorBridge - 강의실</title>

  <!-- Theme/Language Init (must be first) -->
  <script src="./js/theme.js"></script>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine.js: module 스크립트 완료 후 동적 로드 -->

  <!-- Quill.js -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- Day.js -->
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dayjs@1/locale/ko.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>

  <!-- Classroom Styles -->
  <link rel="stylesheet" href="./css/classroom.css">
</head>
<body x-cloak id="app-body" x-data="classroomApp" x-init="init()">

  <!-- Navigation (Dashboard Style) -->
  <nav class="nav">
    <div style="display:flex; align-items:center; gap:1rem; min-width:0; flex:1;">
      <a href="dashboard.html" class="nav-logo" style="flex-shrink:0;">Tutor<span>Bridge</span></a>
      <a href="dashboard.html" style="display:flex; align-items:center; gap:0.375rem; color:#6b7280; font-size:0.8rem; text-decoration:none; white-space:nowrap; flex-shrink:0;" class="hover:text-blue-600">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="14" height="14">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
        </svg>
        대시보드
      </a>
      <span class="nav-course-title" style="font-size:0.9rem; font-weight:600; color:#111827; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" x-text="courseInfo?.title || '강의실'"></span>
    </div>

    <div style="display:flex; align-items:center; gap:0.75rem; position:relative; flex-shrink:0;">
      <!-- Role badge -->
      <span x-show="userRole === 'instructor'" style="background:#dbeafe; color:#1e40af; font-size:0.7rem; font-weight:700; padding:0.2rem 0.5rem; border-radius:9999px;">강사</span>
      <span x-show="userRole === 'student'" style="background:#d1fae5; color:#065f46; font-size:0.7rem; font-weight:700; padding:0.2rem 0.5rem; border-radius:9999px;">학생</span>
      
      <!-- 알림 버튼 -->
      <button style="background:none; border:none; cursor:pointer; position:relative;" @click="showNotifications = !showNotifications" aria-label="알림">
        <svg width="22" height="22" fill="none" stroke="#6b7280" viewBox="0 0 24 24" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg>
        <span x-show="unreadCount > 0" x-text="unreadCount" style="position:absolute; top:-4px; right:-4px; background:#ef4444; color:white; font-size:10px; font-weight:600; width:18px; height:18px; border-radius:50%; display:flex; align-items:center; justify-content:center;"></span>
      </button>
      
      <!-- Notifications Dropdown -->
      <div x-show="showNotifications" @click.away="showNotifications = false" x-transition style="position:fixed; top:64px; right:0.5rem; margin-top:0; width:min(400px, calc(100vw - 1rem)); max-height:70vh; overflow-y:auto; background:white; border-radius:0.75rem; box-shadow:0 10px 40px rgba(0,0,0,0.15); z-index:1000;" x-cloak>
        <div style="padding:1rem; border-bottom:1px solid #e5e7eb; display:flex; justify-content:space-between; align-items:center;">
          <h3 style="font-weight:600; font-size:1.125rem;">알림</h3>
          <div style="display:flex; gap:0.5rem; align-items:center;">
            <button x-show="notifications.length > 0" @click.stop="markAllNotificationsRead()" style="background:none; border:none; cursor:pointer; font-size:0.75rem; color:#2563eb; padding:0.25rem 0.5rem; border-radius:0.375rem; transition:background 0.1s;" onmouseover="this.style.background='#eff6ff'" onmouseout="this.style.background='none'">모두 읽음</button>
            <button style="background:none; border:none; cursor:pointer; padding:0.25rem;" @click="showNotifications = false">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#6b7280" width="20" height="20"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
          </div>
        </div>
        <div style="padding:0;">
          <template x-if="notifications.length === 0">
            <div style="padding:2rem; text-align:center; color:#9ca3af;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#9ca3af" width="48" height="48" style="margin:0 auto 0.75rem;">
                <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0" />
              </svg>
              <p>새로운 알림이 없습니다</p>
            </div>
          </template>
          <template x-for="notification in notifications" :key="notification.id">
            <div style="padding:1rem; border-bottom:1px solid #e5e7eb; transition:background-color 0.15s;" class="notification-item">
              <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:0.25rem;">
                <span style="font-weight:600; font-size:0.95rem; cursor:pointer; flex:1;" x-text="notification.title" @click="handleNotification(notification); showNotifications = false;"></span>
                <div style="display:flex; align-items:center; gap:0.25rem; margin-left:0.5rem; flex-shrink:0;">
                  <span style="font-size:0.75rem; color:#9ca3af; white-space:nowrap;" x-text="formatDate(notification.created_at)"></span>
                  <button @click.stop="deleteNotification(notification)" style="background:none; border:none; cursor:pointer; padding:2px; color:#9ca3af; border-radius:4px; line-height:1; transition:color 0.1s;" title="읽음 처리" onmouseover="this.style.color='#dc2626'" onmouseout="this.style.color='#9ca3af'">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="14" height="14"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                  </button>
                </div>
              </div>
              <p style="font-size:0.875rem; color:#6b7280; line-height:1.5; cursor:pointer;" x-text="notification.message" @click="handleNotification(notification); showNotifications = false;"></p>
            </div>
          </template>
        </div>
      </div>

      <div @click="showProfileDropdown = !showProfileDropdown" style="cursor:pointer; width:36px; height:36px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center;">
        <img x-show="photoURL" :src="photoURL" style="width:100%; height:100%; object-fit:cover;" alt="프로필">
        <div x-show="!photoURL" class="nav-avatar" x-text="userInitials" style="width:100%; height:100%; border-radius:50%; background:linear-gradient(135deg, #3b82f6, #8b5cf6); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:0.875rem;"></div>
      </div>

      <!-- Profile Dropdown -->
      <div x-show="showProfileDropdown" @click.away="showProfileDropdown = false" x-transition class="profile-dropdown" x-cloak>
        <div style="padding:0.5rem;">
          <div style="padding:0.625rem 1rem; font-size:0.875rem; color:#374151; border-bottom:1px solid #f3f4f6; margin-bottom:0.25rem;">
            <div style="font-weight:600;" x-text="user?.displayName || user?.email"></div>
            <div style="font-size:0.75rem; color:#9ca3af;" x-text="user?.email"></div>
          </div>
          <a href="#" style="display:flex; align-items:center; gap:0.5rem; width:100%; padding:0.625rem 1rem; font-size:0.875rem; color:#374151; text-decoration:none; border-radius:0.5rem; transition:background 0.1s;" onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background='none'" onclick="const role=localStorage.getItem('userRole'); location.href=(role==='instructor'||role==='admin'||role==='staff')?'instructorpage.html':'mypage.html'; return false;">
            👤 마이페이지
          </a>
          <a href="settings.html" style="display:flex; align-items:center; gap:0.5rem; width:100%; padding:0.625rem 1rem; font-size:0.875rem; color:#374151; text-decoration:none; border-radius:0.5rem; transition:background 0.1s;" onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background='none'">
            ⚙️ 설정
          </a>
          <button @click="Swal.fire({icon:'info',title:'준비 중입니다',text:'문의사항 기능은 준비 중입니다.',confirmButtonColor:'#2563eb'}); showProfileDropdown = false" style="display:flex; align-items:center; gap:0.5rem; width:100%; padding:0.625rem 1rem; font-size:0.875rem; color:#374151; background:none; border:none; cursor:pointer; border-radius:0.5rem; transition:background 0.1s; display:none;" onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background='none'">
            💬 문의사항
          </button>
          <hr style="margin:0.25rem 0; border:none; border-top:1px solid #e5e7eb;">
          <button @click="doLogout()" class="dropdown-item-danger" style="width:100%; text-align:left; padding:0.625rem 1rem; font-size:0.875rem; color:#dc2626; display:flex; align-items:center; gap:0.5rem;">
            🚪 로그아웃
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Loading state -->
  <div x-show="isLoading" class="classroom-container" style="text-align:center; padding-top:4rem;">
    <div class="loading-spinner"></div>
    <p style="color:#9ca3af; margin-top:0.5rem;">강의실 불러오는 중...</p>
  </div>

  <!-- Notice Modal -->
  <div x-show="showNoticeModal" class="modal-overlay" x-transition @click.self="showNoticeModal = false" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div class="modal-content" style="background:white; border-radius:1rem; max-width:500px; width:100%; max-height:90vh; overflow-y:auto;" @click.stop>
      <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; padding:1.5rem; border-bottom:1px solid #e5e7eb;">
        <h3 style="font-size:1.25rem; font-weight:700;">📝 새 공지 작성</h3>
        <button @click="showNoticeModal = false" style="background:none; border:none; cursor:pointer; padding:0.5rem; border-radius:0.5rem;" onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background='none'">
          <svg width="24" height="24" fill="none" stroke="#6b7280" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div style="padding:1.5rem;">
        <div style="margin-bottom:1rem;">
          <label style="display:block; font-weight:600; margin-bottom:0.5rem;">제목 *</label>
          <input x-model="noticeForm.title" type="text" placeholder="공지사항 제목을 입력하세요" style="width:100%; padding:0.75rem 1rem; border:1px solid #e5e7eb; border-radius:0.5rem; font-size:0.875rem;" class="form-input">
        </div>
        <div style="margin-bottom:1rem;">
          <label style="display:block; font-weight:600; margin-bottom:0.5rem;">내용 *</label>
          <textarea x-model="noticeForm.content" rows="5" placeholder="공지사항 내용을 입력하세요" style="width:100%; padding:0.75rem 1rem; border:1px solid #e5e7eb; border-radius:0.5rem; font-size:0.875rem; resize:none;" class="form-input"></textarea>
        </div>
        <div style="margin-bottom:1.5rem;">
          <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;">
            <input x-model="noticeForm.isImportant" type="checkbox" style="width:1rem; height:1rem;">
            <span>중요 공지로 표시</span>
          </label>
        </div>
        <div style="display:flex; gap:0.75rem; justify-content:flex-end;">
          <button @click="showNoticeModal = false" style="padding:0.75rem 1.5rem; border:1px solid #e5e7eb; background:white; border-radius:0.5rem; font-weight:500; cursor:pointer;">취소</button>
          <button @click="submitNotice()" style="padding:0.75rem 1.5rem; background:#2563eb; color:white; border:none; border-radius:0.5rem; font-weight:500; cursor:pointer;">등록하기</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Notice Detail Modal -->
  <div x-show="showNoticeDetailModal" class="modal-overlay" x-transition @click.self="showNoticeDetailModal = false" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div class="modal-content" style="background:white; border-radius:1rem; max-width:600px; width:100%; max-height:80vh; overflow-y:auto;" @click.stop>
      <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; padding:1.5rem; border-bottom:1px solid #e5e7eb;">
        <div>
          <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.25rem;">
            <span x-show="selectedNotice?.isImportant" style="padding:0.125rem 0.5rem; background:#ef4444; color:white; font-size:0.75rem; font-weight:600; border-radius:9999px;">중요</span>
            <span style="font-size:0.75rem; color:#6b7280;" x-text="formatRelativeTime(selectedNotice?.createdAt)"></span>
          </div>
          <h3 style="font-size:1.25rem; font-weight:700;" x-text="selectedNotice?.title"></h3>
        </div>
        <button @click="showNoticeDetailModal = false" style="background:none; border:none; cursor:pointer; padding:0.5rem; border-radius:0.5rem; flex-shrink:0;" onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background='none'">
          <svg width="24" height="24" fill="none" stroke="#6b7280" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div style="padding:1.5rem;">
        <div style="font-size:0.9375rem; line-height:1.6; color:#374151; white-space:pre-wrap;" x-text="selectedNotice?.content"></div>
      </div>
    </div>
  </div>

  <!-- All Notices Modal -->
  <div x-show="showAllNotices" class="modal-overlay" x-transition @click.self="showAllNotices = false" style="position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:100; display:flex; align-items:center; justify-content:center; padding:1rem;">
    <div class="modal-content" style="background:white; border-radius:1rem; max-width:600px; width:100%; max-height:80vh; overflow-y:auto;" @click.stop>
      <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; padding:1.5rem; border-bottom:1px solid #e5e7eb;">
        <h3 style="font-size:1.25rem; font-weight:700;">📢 모든 공지사항</h3>
        <button @click="showAllNotices = false" style="background:none; border:none; cursor:pointer; padding:0.5rem; border-radius:0.5rem;" onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background='none'">
          <svg width="24" height="24" fill="none" stroke="#6b7280" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div style="padding:1.5rem;">
        <div style="display:flex; flex-direction:column; gap:0.75rem;">
          <template x-for="notice in notices" :key="notice.id">
            <div style="padding:1rem; border:1px solid #e5e7eb; border-radius:0.75rem; cursor:pointer; transition:all 0.15s;" 
                 :style="notice.isImportant ? 'border-left:4px solid #ef4444; background:#fef2f2;' : 'border-left:4px solid #3b82f6;'"
                 @click="selectedNotice = notice; showAllNotices = false; showNoticeDetailModal = true;"
                 onmouseover="this.style.backgroundColor = notice.isImportant ? '#fee2e2' : '#f8fafc'"
                 onmouseout="this.style.backgroundColor = notice.isImportant ? '#fef2f2' : 'white'">
              <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.375rem;">
                <span x-show="notice.isImportant" style="padding:0.125rem 0.5rem; background:#ef4444; color:white; font-size:0.75rem; font-weight:600; border-radius:9999px;">중요</span>
                <span x-text="formatRelativeTime(notice.createdAt)" style="font-size:0.75rem; color:#6b7280;"></span>
              </div>
              <div style="font-weight:600; font-size:1rem; color:#111827;" x-text="notice.title"></div>
            </div>
          </template>
        </div>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div x-show="!isLoading" class="classroom-container" style="display:grid; grid-template-columns:1fr 280px; gap:1.5rem;">
    <!-- Left Main Content -->
    <div>
    <!-- Course Header -->
    <div class="card" style="background:linear-gradient(135deg,#2563eb,#7c3aed); color:white; padding:1.5rem 2rem; margin-bottom:1.5rem;">
      <div style="font-size:0.8rem; opacity:0.8; margin-bottom:0.25rem;" x-text="getCategoryText(courseInfo?.category)"></div>
      <h1 style="font-size:1.5rem; font-weight:700; margin-bottom:0.375rem;" x-text="courseInfo?.title || '강의실'"></h1>
      <p style="font-size:0.875rem; opacity:0.85;" x-text="courseInfo?.description || ''"></p>
      <div style="display:flex; align-items:center; gap:1rem; margin-top:1rem; flex-wrap:wrap;">
        <span style="font-size:0.8rem; opacity:0.9;">👨‍🏫 <span x-text="courseInfo?.instructorName || '강사'"></span></span>
        <span style="font-size:0.8rem; opacity:0.9;">📚 <span x-text="lessons.length"></span>개 강의자료</span>
        <span x-show="userRole === 'instructor'" style="background:rgba(255,255,255,0.2); border-radius:9999px; padding:0.2rem 0.625rem; font-size:0.75rem; font-weight:700;">강사 모드</span>
      </div>
    </div>

    <!-- ========= INSTRUCTOR UI ========= -->
    <template x-if="userRole === 'instructor'">
      <div>
        <!-- Post form -->
        <div class="card">
          <div class="card-title">📝 새 강의자료 첨부</div>

          <div class="form-group">
            <label class="form-label">제목 *</label>
            <input type="text" class="form-input" x-model="form.title" placeholder="강의자료 제목을 입력하세요">
          </div>

          <div class="form-group">
            <label class="form-label">강의 일정 *</label>
            <div class="date-picker-wrapper">
              <div class="date-picker-input" @click="showDatePicker = !showDatePicker">
                <span x-text="form.scheduledDate ? formatDateFull(form.scheduledDate) : '날짜를 선택하세요'"></span>
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="18" height="18">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
                </svg>
              </div>
              <div x-show="showDatePicker" @click.away="showDatePicker = false" x-transition class="date-picker-dropdown" x-cloak>
                <div class="calendar-container">
                  <div class="calendar-header">
                    <div class="calendar-month-year">
                      <span x-text="calendarYear"></span>년 <span x-text="calendarMonth + 1"></span>월
                    </div>
                    <div class="calendar-nav">
                      <button class="calendar-nav-btn" @click="prevMonth()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 15.75l-7.5-7.5-7.5 7.5"/></svg>
                      </button>
                      <button class="calendar-nav-btn" @click="nextMonth()">
                        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 8.25l7.5 7.5 7.5-7.5"/></svg>
                      </button>
                    </div>
                  </div>
                  <div class="calendar-weekdays">
                    <div class="calendar-weekday sunday">일</div>
                    <div class="calendar-weekday">월</div>
                    <div class="calendar-weekday">화</div>
                    <div class="calendar-weekday">수</div>
                    <div class="calendar-weekday">목</div>
                    <div class="calendar-weekday">금</div>
                    <div class="calendar-weekday saturday">토</div>
                  </div>
                  <div class="calendar-days">
                    <template x-for="day in calendarDays" :key="day.key">
                      <div 
                        class="calendar-day"
                        :class="{
                          'other-month': day.otherMonth,
                          'selected': isSelectedDate(day.date),
                          'has-lesson': day.hasLesson,
                          'today': day.isToday,
                          'sunday': day.dayOfWeek === 0,
                          'saturday': day.dayOfWeek === 6
                        }"
                        @click="selectDate(day.date)"
                        x-text="day.dayOfMonth"
                      ></div>
                    </template>
                  </div>
                </div>
              </div>
            </div>
            <p style="font-size:0.75rem; color:#9ca3af; margin-top:0.375rem;">강의가 공개될 날짜를 선택하세요. 선택한 날짜에 강의가 표시됩니다.</p>
          </div>

          <div class="form-group">
            <label class="form-label">콘텐츠 유형</label>
            <div class="type-selector">
              <button class="type-btn" :class="form.type === 'youtube' ? 'active' : ''" @click="form.type = 'youtube'; resetContent()">
                🎬 YouTube 동영상
              </button>
              <button class="type-btn" :class="form.type === 'text' ? 'active' : ''" @click="form.type = 'text'; resetContent(); $nextTick(() => initQuill())">
                📄 텍스트 강의
              </button>
              <button class="type-btn" :class="form.type === 'file' ? 'active' : ''" @click="form.type = 'file'; resetContent()">
                📎 파일 첨부
              </button>
            </div>
          </div>

          <!-- YouTube input -->
          <div x-show="form.type === 'youtube'" class="form-group">
            <label class="form-label">YouTube URL</label>
            <input type="text" class="form-input" x-model="form.youtubeUrl" placeholder="https://www.youtube.com/watch?v=... 또는 https://youtu.be/..." @input="previewYoutube()">
            <div x-show="form.youtubePreviewId" style="margin-top:0.75rem;">
              <div class="youtube-wrapper">
                <iframe :src="'https://www.youtube.com/embed/' + form.youtubePreviewId" allowfullscreen></iframe>
              </div>
            </div>
          </div>

          <!-- Text editor -->
          <div x-show="form.type === 'text'" class="form-group">
            <div style="display:flex; justify-content:space-between; align-items:center; gap:0.75rem; margin-bottom:0.5rem; flex-wrap:wrap;">
              <label class="form-label" style="margin-bottom:0;">강의 내용</label>
              <button type="button" class="btn btn-secondary btn-sm" @click="insertCheckpointToken()">확인했습니다 체크 추가</button>
            </div>
            <div id="quill-editor"></div>
            <p style="font-size:0.75rem; color:#9ca3af; margin-top:0.375rem;">텍스트 강의 중간에 학습 확인 지점을 넣고, 학생이 모두 체크한 뒤 하단에서 수료 처리할 수 있습니다.</p>
          </div>

          <!-- File input -->
          <div x-show="form.type === 'file'" class="form-group">
            <label class="form-label">파일 선택</label>
            <div style="display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap;">
              <label class="file-label" style="display:inline-flex; align-items:center; gap:0.5rem; padding:0.625rem 1.25rem; background:#f3f4f6; border:1px solid #e5e7eb; border-radius:0.5rem; cursor:pointer; font-size:0.875rem; font-weight:500; color:#374151;">
                📁 파일 선택
                <input type="file" style="display:none;" accept=".pdf,.doc,.docx,.xlsx,.xls,.txt,.zip,.js,.ts,.py,.java,.cpp,.c,.cs,.go,.rs,.swift,.html,.css,.json,.md" @change="handleFileSelect($event)">
              </label>
              <span x-show="form.selectedFile" style="font-size:0.875rem; color:#6b7280;" x-text="form.selectedFile?.name || ''"></span>
              <span x-show="form.uploadProgress > 0 && form.uploadProgress < 100" style="font-size:0.875rem; color:#2563eb; font-weight:600;" x-text="'업로드 중... ' + form.uploadProgress + '%'"></span>
            </div>
            <p style="font-size:0.75rem; color:#9ca3af; margin-top:0.375rem;">지원 형식: PDF, DOC, DOCX, XLSX, TXT, ZIP, JS, TS, PY, JAVA, CPP, CS, GO, RS, Swift 등</p>
          </div>

          <!-- Submit button -->
          <div style="display:flex; justify-content:flex-end;">
            <button class="btn btn-primary" @click="submitLesson()" :disabled="isSubmitting">
              <span x-show="!isSubmitting">📤 게시하기</span>
              <span x-show="isSubmitting">게시 중...</span>
            </button>
          </div>
        </div>

        <!-- Lessons list (instructor) -->
        <div class="card">
          <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
            <span>📚 강의자료</span>
          </div>

          <!-- Calendar for viewing -->
          <div style="margin-bottom:1.5rem;">
            <div class="calendar-container" style="background:#f8fafc; border:1px solid #e5e7eb;">
              <div class="calendar-header" style="position:relative;">
                <div class="calendar-month-year" style="color:#111827; cursor:pointer; display:flex; align-items:center; gap:4px;" @click="openYearMonthPicker()">
                  <span x-text="viewCalendarYear"></span>년 <span x-text="viewCalendarMonth + 1"></span>월
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="16" height="16">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
                  </svg>
                </div>
                <!-- Year/Month Picker Dropdown -->
                <div x-show="showYearMonthPicker" @click.away="closeYearMonthPicker()" x-transition class="year-month-picker" x-cloak>
                  <div class="year-selector">
                    <button @click="changePickerYear(-1)">
                      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
                    </button>
                    <span x-text="pickerTempYear + '년'"></span>
                    <button @click="changePickerYear(1)">
                      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                    </button>
                  </div>
                  <div class="year-month-picker-grid">
                    <template x-for="(monthName, index) in ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월']" :key="index">
                      <button 
                        class="year-month-picker-btn" 
                        :class="{ 'selected': pickerTempYear === viewCalendarYear && index === viewCalendarMonth }"
                        @click="selectPickerMonth(index)"
                        x-text="monthName"
                      ></button>
                    </template>
                  </div>
                </div>
                <div class="calendar-nav">
                  <button class="calendar-nav-btn" @click="prevViewMonth()" style="color:#6b7280;">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 15.75l-7.5-7.5-7.5 7.5"/></svg>
                  </button>
                  <button class="calendar-nav-btn" @click="nextViewMonth()" style="color:#6b7280;">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 8.25l7.5 7.5 7.5-7.5"/></svg>
                  </button>
                </div>
              </div>
              <div class="calendar-weekdays">
                <div class="calendar-weekday sunday">일</div>
                <div class="calendar-weekday">월</div>
                <div class="calendar-weekday">화</div>
                <div class="calendar-weekday">수</div>
                <div class="calendar-weekday">목</div>
                <div class="calendar-weekday">금</div>
                <div class="calendar-weekday saturday">토</div>
              </div>
              <div class="calendar-days">
                <template x-for="day in viewCalendarDays" :key="day.key">
                  <div 
                    class="calendar-day"
                    :class="{
                      'other-month': day.otherMonth,
                      'selected': isViewSelectedDate(day.date),
                      'has-lesson': day.hasLesson,
                      'today': day.isToday,
                      'sunday': day.dayOfWeek === 0,
                      'saturday': day.dayOfWeek === 6
                    }"
                    :style="day.isToday && !isViewSelectedDate(day.date) ? 'border:1px solid #3b82f6; color:#111827;' : day.otherMonth ? 'color:#9ca3af;' : 'color:#374151;'"
                    @click="selectViewDate(day.date)"
                    x-text="day.dayOfMonth"
                  ></div>
                </template>
              </div>
            </div>
          </div>

          <!-- Search Bar -->
          <div style="margin:1rem 0; display:flex; align-items:center; gap:0.5rem;">
            <!-- 전체 보기 버튼 -->
            <button 
              @click="selectedViewDate = null; currentPage = 1" 
              class="view-all-btn"
              :class="{ 'active': !selectedViewDate }"
            >
              전체 보기
            </button>
            
            <!-- 날짜 필터 표시 -->
            <span x-show="selectedViewDate" style="font-size:0.875rem; color:#6b7280; white-space:nowrap;">
              📅 <span x-text="selectedViewDate"></span>
            </span>
            
            <!-- 날짜 필터 제거 버튼 -->
            <button 
              x-show="selectedViewDate" 
              @click="selectedViewDate = null; currentPage = 1" 
              style="padding:0.25rem; border:none; background:none; cursor:pointer; color:#9ca3af;"
            >
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
            
            <div style="flex:1; display:flex; align-items:center; gap:0.5rem; background:#f8fafc; border:1px solid #e5e7eb; border-radius:0.5rem; padding:0.5rem 0.75rem;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#9ca3af" width="20" height="20">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
              </svg>
              <input 
                type="text" 
                x-model="searchQuery" 
                @input="currentPage = 1"
                placeholder="제목으로 검색..." 
                style="flex:1; border:none; background:transparent; font-size:0.875rem; outline:none; color:#374151;"
              >
              <button x-show="searchQuery" @click="searchQuery = ''; currentPage = 1" style="background:none; border:none; cursor:pointer; padding:0.25rem;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#9ca3af" width="16" height="16">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
          </div>
          <div style="display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem;">
            <span x-show="selectedViewDate" class="selected-date-info">
              <span x-text="formatDateFull(selectedViewDate)"></span>
              <button @click="clearDateFilter()">×</button>
            </span>
            <span style="font-size:0.8rem; font-weight:400; color:#9ca3af;" x-text="filteredLessons.length + '개'"></span>
          </div>

          <div x-show="filteredLessons.length === 0" style="text-align:center; padding:2.5rem; color:#9ca3af;">
            <div style="font-size:2.5rem; margin-bottom:0.5rem;">📭</div>
            <p x-text="selectedViewDate ? '선택한 날짜에 게시된 강의가 없습니다.' : '아직 게시된 강의가 없습니다.'"></p>
          </div>

          <template x-for="lesson in paginatedLessons" :key="lesson.id">
            <div class="lesson-item">
              <div class="lesson-item-header" @click="lesson._open = !lesson._open">
                <div style="display:flex; align-items:center; gap:0.75rem; min-width:0; flex:1;">
                  <span class="lesson-type-badge" :class="lesson.type === 'youtube' ? 'badge-youtube' : lesson.type === 'text' ? 'badge-text' : 'badge-file'" x-text="lesson.type === 'youtube' ? '🎬 영상' : lesson.type === 'text' ? '📄 텍스트' : '📎 파일'"></span>
                  <span style="font-weight:600; color:#111827; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" x-text="lesson.title"></span>
                </div>
                <div style="display:flex; align-items:center; gap:0.5rem; flex-shrink:0;">
                  <span style="font-size:0.75rem; color:#9ca3af; white-space:nowrap;" x-text="formatDateFull(lesson.scheduledDate)"></span>
                  <button class="btn btn-secondary btn-sm" @click.stop="openEditModal(lesson)">수정</button>
                  <button class="btn btn-danger btn-sm" @click.stop="deleteLesson(lesson.id)">삭제</button>
                  <svg class="collapse-icon" :class="lesson._open ? 'open' : ''" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#9ca3af" width="16" height="16">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                  </svg>
                </div>
              </div>
              <div class="lesson-body" x-show="lesson._open" x-transition>
                <template x-if="lesson.type === 'youtube'">
                  <div class="youtube-wrapper">
                    <iframe :src="'https://www.youtube.com/embed/' + lesson.content" allowfullscreen></iframe>
                  </div>
                </template>
                <template x-if="lesson.type === 'text'">
                  <div class="lesson-text-content ql-editor" style="padding:0;" x-html="lesson.content"></div>
                </template>
                <template x-if="lesson.type === 'file'">
                  <div>
                    <a :href="lesson.content" target="_blank" class="file-download-link">
                      📥 <span x-text="lesson.fileName || '파일 다운로드'"></span>
                    </a>
                    <span style="font-size:0.75rem; color:#9ca3af; margin-left:0.5rem;" x-text="lesson.fileType || ''"></span>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Pagination -->
          <div x-show="totalPages > 1" style="display:flex; justify-content:center; align-items:center; gap:0.25rem; margin-top:1rem;">
            <button 
              @click="currentPage > 1 ? currentPage-- : null" 
              :disabled="currentPage === 1"
              style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#6b7280; cursor:pointer; border-radius:0.375rem; transition:all 0.15s;"
              :style="currentPage === 1 ? 'opacity:0.3; cursor:not-allowed;' : 'background:#f3f4f6;'"
            >
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
              </svg>
            </button>
            
            <template x-for="page in visiblePages" :key="page">
              <button 
                @click="currentPage = page"
                x-text="page"
                style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; font-size:0.875rem; cursor:pointer; border-radius:0.375rem; transition:all 0.15s;"
                :style="currentPage === page ? 'background:#111827; color:white; font-weight:600;' : 'color:#6b7280; hover:background:#f3f4f6;'"
              ></button>
            </template>
            
            <button 
              @click="currentPage < totalPages ? currentPage++ : null" 
              :disabled="currentPage === totalPages"
              style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#6b7280; cursor:pointer; border-radius:0.375rem; transition:all 0.15s;"
              :style="currentPage === totalPages ? 'opacity:0.3; cursor:not-allowed;' : 'background:#f3f4f6;'"
            >
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Instructor Notices Section -->
        <div class="card" style="margin-top:1.5rem;">
          <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
            <span>📢 공지사항 관리</span>
            <button @click="showNoticeModal = true" class="btn btn-primary" style="padding:0.5rem 1rem; font-size:0.875rem;">
              + 새 공지 작성
            </button>
          </div>

          <!-- Notice List -->
          <div style="display:flex; flex-direction:column; gap:0.75rem;">
            <template x-for="notice in notices" :key="notice.id">
              <div style="padding:1rem; border:1px solid #e5e7eb; border-radius:0.75rem; background:#f8fafc;" :style="notice.isImportant ? 'border-left:4px solid #ef4444;' : 'border-left:4px solid #3b82f6;'">
                <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:0.75rem;">
                  <div style="flex:1;">
                    <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.375rem;">
                      <span x-show="notice.isImportant" style="padding:0.125rem 0.5rem; background:#ef4444; color:white; font-size:0.75rem; font-weight:600; border-radius:9999px;">중요</span>
                      <span x-text="formatRelativeTime(notice.createdAt)" style="font-size:0.75rem; color:#6b7280;"></span>
                    </div>
                    <div style="font-weight:600; font-size:1rem; color:#111827; margin-bottom:0.25rem;" x-text="notice.title"></div>
                    <div style="font-size:0.875rem; color:#4b5563; white-space:pre-wrap;" x-text="notice.content"></div>
                  </div>
                  <button @click="deleteNotice(notice.id)" style="padding:0.375rem; color:#ef4444; border:none; background:none; cursor:pointer; border-radius:0.375rem;" onmouseover="this.style.background='#fee2e2'" onmouseout="this.style.background='none'">
                    <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                  </button>
                </div>
              </div>
            </template>
            <div x-show="notices.length === 0" style="text-align:center; padding:2rem; color:#9ca3af;">
              <div style="font-size:2rem; margin-bottom:0.5rem;">📭</div>
              <p>등록된 공지사항이 없습니다</p>
            </div>
          </div>
        </div>

        <div class="card" style="margin-top:1.5rem;">
          <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
            <span>📊 학생별 강의 진행 리포트</span>
            <span style="font-size:0.8rem; color:#6b7280;" x-text="students.length + '명 승인됨'"></span>
          </div>

          <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:0.875rem; margin-bottom:1rem;">
            <div style="padding:1rem; border:1px solid #e5e7eb; border-radius:0.875rem; background:#f8fafc;">
              <div style="font-size:0.75rem; color:#6b7280; margin-bottom:0.35rem;">평균 수강률</div>
              <div style="font-size:1.75rem; font-weight:800; color:#2563eb;" x-text="getInstructorAverageProgress() + '%'"></div>
            </div>
            <div style="padding:1rem; border:1px solid #e5e7eb; border-radius:0.875rem; background:#f8fafc;">
              <div style="font-size:0.75rem; color:#6b7280; margin-bottom:0.35rem;">전체 수료 학생</div>
              <div style="font-size:1.75rem; font-weight:800; color:#059669;" x-text="getInstructorCompletedStudentCount() + '명'"></div>
            </div>
            <div style="padding:1rem; border:1px solid #e5e7eb; border-radius:0.875rem; background:#f8fafc;">
              <div style="font-size:0.75rem; color:#6b7280; margin-bottom:0.35rem;">영상 소감문 제출</div>
              <div style="font-size:1.75rem; font-weight:800; color:#7c3aed;" x-text="getInstructorReflectionOverview().completed + '/' + getInstructorReflectionOverview().total"></div>
            </div>
            <div style="padding:1rem; border:1px solid #e5e7eb; border-radius:0.875rem; background:#f8fafc;">
              <div style="font-size:0.75rem; color:#6b7280; margin-bottom:0.35rem;">텍스트 체크포인트 이행</div>
              <div style="font-size:1.75rem; font-weight:800; color:#ea580c;" x-text="getInstructorCheckpointOverview().checked + '/' + getInstructorCheckpointOverview().total"></div>
            </div>
          </div>

          <div x-show="students.length === 0" style="text-align:center; padding:2rem; color:#9ca3af;">
            <div style="font-size:2rem; margin-bottom:0.5rem;">👥</div>
            <p>아직 승인된 수강생이 없습니다</p>
          </div>

          <div style="display:flex; flex-direction:column; gap:0.875rem;" x-show="students.length > 0">
            <template x-for="student in students" :key="student.id">
              <div style="border:1px solid #e5e7eb; border-radius:1rem; overflow:hidden; background:white;">
                <button type="button" @click="toggleStudentProgress(student)" :aria-expanded="openStudentProgressId === student.id" style="width:100%; padding:1rem; background:none; border:none; cursor:pointer; text-align:left; display:flex; justify-content:space-between; align-items:flex-start; gap:1rem;">
                  <div style="display:flex; gap:0.875rem; min-width:0; flex:1;">
                    <div style="width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg, #3b82f6, #8b5cf6); color:white; display:flex; align-items:center; justify-content:center; font-weight:800; flex-shrink:0;" x-text="getInitials(student.studentName || student.studentEmail || '학생')"></div>
                    <div style="min-width:0; flex:1;">
                      <div style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.35rem;">
                        <span style="font-size:1rem; font-weight:700; color:#111827;" x-text="student.studentName || '수강생'"></span>
                        <span style="font-size:0.75rem; padding:0.2rem 0.5rem; border-radius:9999px; background:#eff6ff; color:#1d4ed8;" x-text="getStudentProgressLabel(student)"></span>
                      </div>
                      <div style="font-size:0.8rem; color:#6b7280; margin-bottom:0.65rem;" x-text="student.studentEmail || ''"></div>
                      <div style="display:flex; align-items:center; gap:0.6rem; flex-wrap:wrap;">
                        <div style="width:180px; height:0.45rem; background:#e5e7eb; border-radius:9999px; overflow:hidden;">

                        <span style="font-size:0.875rem; font-weight:700; color:#2563eb;" x-text="getStudentOverallProgress(student) + '%'"></span>
                        <span style="font-size:0.75rem; color:#6b7280;" x-text="getStudentCompletedLessonsCount(student) + '/' + getStudentTotalLessonsCount(student) + ' 강의 완료'"></span>

                    <svg class="collapse-icon" :class="openStudentProgressId === student.id ? 'open' : ''" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#9ca3af" width="18" height="18">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                    </svg>
                  </div>
                </button>

                <div x-show="openStudentProgressId === student.id" x-transition style="padding:0 1rem 1rem 1rem; border-top:1px solid #f3f4f6;">
                  <div style="display:flex; flex-direction:column; gap:0.625rem; margin-top:0.875rem;">
                    <template x-for="report in getStudentLessonReports(student)" :key="report.lesson.id">
                      <div style="padding:0.875rem 1rem; border:1px solid #e5e7eb; border-radius:0.875rem; background:#fafafa; display:flex; justify-content:space-between; align-items:flex-start; gap:1rem; flex-wrap:wrap;">
                        <div style="min-width:0; flex:1;">
                          <div style="display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap; margin-bottom:0.35rem;">
                            <span class="lesson-type-badge" :class="report.lesson.type === 'youtube' ? 'badge-youtube' : report.lesson.type === 'text' ? 'badge-text' : 'badge-file'" x-text="report.lesson.type === 'youtube' ? '🎬 영상' : report.lesson.type === 'text' ? '📄 텍스트' : '📎 파일'"></span>
                            <span style="font-weight:700; color:#111827;" x-text="report.lesson.title"></span>
                            <span x-show="report.progress.completed" style="font-size:0.7rem; padding:0.15rem 0.45rem; border-radius:9999px; background:#dcfce7; color:#166534; font-weight:700;">완료</span>
                          </div>
                          <div style="font-size:0.8rem; color:#6b7280;" x-text="report.detail"></div>
                          <div x-show="getStudentReflectionText(report)" style="margin-top:0.75rem; padding:0.75rem; border-radius:0.75rem; background:#f5f3ff; border:1px solid #ddd6fe;">
                            <div style="font-size:0.75rem; font-weight:700; color:#6d28d9; margin-bottom:0.35rem;">학생 소감문</div>
                            <div style="font-size:0.85rem; color:#4c1d95; line-height:1.65; white-space:pre-wrap;" x-text="getStudentReflectionText(report)"></div>
                          </div>
                        </div>
                        <div style="display:flex; align-items:center; gap:0.6rem; flex-shrink:0;">
                          <div style="width:140px; height:0.4rem; background:#e5e7eb; border-radius:9999px; overflow:hidden;">
                            <div style="height:100%; background:linear-gradient(90deg, #2563eb, #8b5cf6); border-radius:9999px;" :style="`width:${report.progress.percent}%`"></div>
                          </div>
                          <span style="font-size:0.85rem; font-weight:800; color:#2563eb; min-width:3rem; text-align:right;" x-text="report.progress.percent + '%'"></span>
                        </div>
                      </div>
                    </template>
                  </div>
                </div>
              </div>
            </template>
          </div>
        </div>
      </div>
    </template>

    <!-- ========= STUDENT UI ========= -->
    <template x-if="userRole === 'student'">
      <div>
        <!-- Student Notices Section -->
        <div x-show="notices.length > 0" class="card" style="margin-bottom:1.5rem;">
          <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
            <span>📢 공지사항</span>
            <span style="font-size:0.75rem; color:#6b7280;" x-text="notices.length + '개'"></span>
          </div>
          <div style="display:flex; flex-direction:column; gap:0.75rem;">
            <template x-for="notice in notices.slice(0, 3)" :key="notice.id">
              <div style="padding:1rem; border:1px solid #e5e7eb; border-radius:0.75rem; cursor:pointer; transition:all 0.15s;" 
                   :style="notice.isImportant ? 'border-left:4px solid #ef4444; background:#fef2f2;' : 'border-left:4px solid #3b82f6;'"
                   @click="selectedNotice = notice; showNoticeDetailModal = true;"
                   onmouseover="this.style.backgroundColor = notice.isImportant ? '#fee2e2' : '#f8fafc'"
                   onmouseout="this.style.backgroundColor = notice.isImportant ? '#fef2f2' : 'white'">
                <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.375rem;">
                  <span x-show="notice.isImportant" style="padding:0.125rem 0.5rem; background:#ef4444; color:white; font-size:0.75rem; font-weight:600; border-radius:9999px;">중요</span>
                  <span x-text="formatRelativeTime(notice.createdAt)" style="font-size:0.75rem; color:#6b7280;"></span>
                </div>
                <div style="font-weight:600; font-size:1rem; color:#111827;" x-text="notice.title"></div>
              </div>
            </template>
            <div x-show="notices.length > 3" style="text-align:center; padding:0.5rem;">
              <button @click="showAllNotices = true" style="color:#2563eb; font-size:0.875rem; font-weight:500; background:none; border:none; cursor:pointer;">모든 공지 보기 →</button>
            </div>
          </div>
        </div>

        <div class="card">
          <div class="card-title" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
            <span>📚 강의자료</span>
            <div style="display:flex; align-items:center; gap:0.75rem;">
              <span x-show="selectedViewDate" class="selected-date-info">
                <span x-text="formatDateFull(selectedViewDate)"></span>
                <button @click="clearDateFilter()">×</button>
              </span>
              <span style="font-size:0.8rem; font-weight:400; color:#9ca3af;" x-text="filteredLessons.length + '개 강의'"></span>
            </div>
          </div>

          <!-- Calendar for viewing -->
          <div style="margin-bottom:1.5rem;">
            <div class="calendar-container" style="background:#f8fafc; border:1px solid #e5e7eb;">
              <div class="calendar-header" style="position:relative;">
                <div class="calendar-month-year" style="color:#111827; cursor:pointer; display:flex; align-items:center; gap:4px;" @click="openYearMonthPicker()">
                  <span x-text="viewCalendarYear"></span>년 <span x-text="viewCalendarMonth + 1"></span>월
                  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="16" height="16">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5"/>
                  </svg>
                </div>
                <!-- Year/Month Picker Dropdown -->
                <div x-show="showYearMonthPicker" @click.away="closeYearMonthPicker()" x-transition class="year-month-picker" x-cloak>
                  <div class="year-selector">
                    <button @click="changePickerYear(-1)">
                      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
                    </button>
                    <span x-text="pickerTempYear + '년'"></span>
                    <button @click="changePickerYear(1)">
                      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
                    </button>
                  </div>
                  <div class="year-month-picker-grid">
                    <template x-for="(monthName, index) in ['1월', '2월', '3월', '4월', '5월', '6월', '7월', '8월', '9월', '10월', '11월', '12월']" :key="index">
                      <button 
                        class="year-month-picker-btn" 
                        :class="{ 'selected': pickerTempYear === viewCalendarYear && index === viewCalendarMonth }"
                        @click="selectPickerMonth(index)"
                        x-text="monthName"
                      ></button>
                    </template>
                  </div>
                </div>
                <div class="calendar-nav">
                  <button class="calendar-nav-btn" @click="prevViewMonth()" style="color:#6b7280;">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 15.75l-7.5-7.5-7.5 7.5"/></svg>
                  </button>
                  <button class="calendar-nav-btn" @click="nextViewMonth()" style="color:#6b7280;">
                    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.5 8.25l7.5 7.5 7.5-7.5"/></svg>
                  </button>
                </div>
              </div>
              <div class="calendar-weekdays">
                <div class="calendar-weekday sunday">일</div>
                <div class="calendar-weekday">월</div>
                <div class="calendar-weekday">화</div>
                <div class="calendar-weekday">수</div>
                <div class="calendar-weekday">목</div>
                <div class="calendar-weekday">금</div>
                <div class="calendar-weekday saturday">토</div>
              </div>
              <div class="calendar-days">
                <template x-for="day in viewCalendarDays" :key="day.key">
                  <div 
                    class="calendar-day"
                    :class="{
                      'other-month': day.otherMonth,
                      'selected': isViewSelectedDate(day.date),
                      'has-lesson': day.hasLesson,
                      'today': day.isToday,
                      'sunday': day.dayOfWeek === 0,
                      'saturday': day.dayOfWeek === 6
                    }"
                    :style="day.isToday && !isViewSelectedDate(day.date) ? 'border:1px solid #3b82f6; color:#111827;' : day.otherMonth ? 'color:#9ca3af;' : 'color:#374151;'"
                    @click="selectViewDate(day.date)"
                    x-text="day.dayOfMonth"
                  ></div>
                </template>
              </div>
            </div>
          </div>

          <!-- Search Bar -->
          <div style="margin:1rem 0; display:flex; align-items:center; gap:0.5rem;">
            <!-- 전체 보기 버튼 -->
            <button 
              @click="selectedViewDate = null; currentPage = 1" 
              class="view-all-btn"
              :class="{ 'active': !selectedViewDate }"
            >
              전체 보기
            </button>
            
            <!-- 날짜 필터 표시 -->
            <span x-show="selectedViewDate" style="font-size:0.875rem; color:#6b7280; white-space:nowrap;">
              📅 <span x-text="selectedViewDate"></span>
            </span>
            
            <!-- 날짜 필터 제거 버튼 -->
            <button 
              x-show="selectedViewDate" 
              @click="selectedViewDate = null; currentPage = 1" 
              style="padding:0.25rem; border:none; background:none; cursor:pointer; color:#9ca3af;"
            >
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
            
            <div style="flex:1; display:flex; align-items:center; gap:0.5rem; background:#f8fafc; border:1px solid #e5e7eb; border-radius:0.5rem; padding:0.5rem 0.75rem;">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#9ca3af" width="20" height="20">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" />
              </svg>
              <input 
                type="text" 
                x-model="searchQuery" 
                @input="currentPage = 1"
                placeholder="제목으로 검색..." 
                style="flex:1; border:none; background:transparent; font-size:0.875rem; outline:none; color:#374151;"
              >
              <button x-show="searchQuery" @click="searchQuery = ''; currentPage = 1" style="background:none; border:none; cursor:pointer; padding:0.25rem;">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#9ca3af" width="16" height="16">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
              </button>
            </div>
          </div>

          <div x-show="filteredLessons.length === 0" style="text-align:center; padding:2.5rem; color:#9ca3af;">
            <div style="font-size:2.5rem; margin-bottom:0.5rem;">📭</div>
            <p x-text="selectedViewDate ? '선택한 날짜에 게시된 강의가 없습니다.' : (searchQuery ? '검색 결과가 없습니다.' : '이번 달에 게시된 강의가 없습니다.')"></p>
            <p x-show="!selectedViewDate && !searchQuery" style="font-size:0.875rem; margin-top:0.5rem;">강사님이 강의를 업로드하면 여기에 표시됩니다.</p>
          </div>

          <template x-for="lesson in paginatedLessons" :key="lesson.id">
            <div class="lesson-item">
              <div class="lesson-item-header" @click="toggleLesson(lesson)">
                <div style="display:flex; align-items:center; gap:0.75rem; min-width:0; flex:1;">
                  <span class="lesson-type-badge" :class="lesson.type === 'youtube' ? 'badge-youtube' : lesson.type === 'text' ? 'badge-text' : 'badge-file'" x-text="lesson.type === 'youtube' ? '🎬 영상' : lesson.type === 'text' ? '📄 텍스트' : '📎 파일'"></span>
                  <div style="min-width:0; flex:1;">
                    <div style="font-weight:600; color:#111827; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" x-text="lesson.title"></div>
                    <div style="margin-top:0.375rem; display:flex; align-items:center; gap:0.5rem; flex-wrap:wrap;">
                      <div style="width:140px; height:0.4rem; background:#e5e7eb; border-radius:9999px; overflow:hidden;">
                        <div style="height:100%; background:linear-gradient(90deg, #2563eb, #8b5cf6); border-radius:9999px; transition:width 0.2s;" :style="`width:${getLessonProgressPercent(lesson)}%`"></div>
                      </div>
                      <span style="font-size:0.75rem; color:#2563eb; font-weight:700;" x-text="getLessonProgressPercent(lesson) + '%'"></span>
                      <span style="font-size:0.75rem; color:#6b7280;" x-text="getLessonProgressLabel(lesson)"></span>
                    </div>
                  </div>
                </div>
                <div style="display:flex; align-items:center; gap:0.5rem; flex-shrink:0;">
                  <span x-show="getLessonCompleted(lesson)" style="padding:0.2rem 0.55rem; border-radius:9999px; background:#dcfce7; color:#166534; font-size:0.7rem; font-weight:700;">완료</span>
                  <span style="font-size:0.75rem; color:#9ca3af; white-space:nowrap;" x-text="formatDateFull(lesson.scheduledDate)"></span>
                  <svg class="collapse-icon" :class="lesson._open ? 'open' : ''" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="#9ca3af" width="16" height="16">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                  </svg>
                </div>
              </div>
              <div class="lesson-body" x-show="lesson._open" x-transition>
                <template x-if="lesson.type === 'youtube'">
                  <div>
                    <div class="youtube-wrapper">
                      <div :id="getYoutubePlayerContainerId(lesson.id)"></div>
                    </div>
                    <div style="margin-top:1rem; padding:1rem; border:1px solid #e5e7eb; border-radius:0.875rem; background:#f8fafc;">
                      <div style="display:flex; justify-content:space-between; align-items:center; gap:0.75rem; flex-wrap:wrap; margin-bottom:0.75rem;">
                        <div>
                          <div style="font-size:0.875rem; font-weight:700; color:#111827;">영상 학습 진행</div>
                          <div style="font-size:0.75rem; color:#6b7280;" x-text="getLessonProgressLabel(lesson)"></div>
                        </div>
                        <div style="font-size:0.875rem; font-weight:700; color:#2563eb;" x-text="getLessonProgressPercent(lesson) + '%'"></div>
                      </div>
                      <textarea class="form-input" rows="4" placeholder="영상을 끝까지 시청한 뒤 소감문을 작성해 주세요" :value="getLessonReflectionValue(lesson)" @input="updateLessonReflectionDraft(lesson.id, $event.target.value)" style="resize:vertical;"></textarea>
                      <div style="display:flex; justify-content:flex-end; margin-top:0.75rem;">
                        <button type="button" class="btn btn-primary btn-sm" @click="saveYoutubeReflection(lesson)">소감문 저장</button>
                      </div>
                    </div>
                  </div>
                </template>
                <template x-if="lesson.type === 'text'">
                  <div>
                    <div class="lesson-text-content ql-editor" style="padding:0;" x-html="renderTextLessonContent(lesson)" @change="handleTextCheckpointChange($event, lesson)"></div>
                    <div style="margin-top:1rem; display:flex; justify-content:space-between; align-items:center; gap:0.75rem; flex-wrap:wrap; padding:1rem; border:1px solid #e5e7eb; border-radius:0.875rem; background:#f8fafc;">
                      <div>
                        <div style="font-size:0.875rem; font-weight:700; color:#111827;">텍스트 학습 확인</div>
                        <div style="font-size:0.75rem; color:#6b7280;" x-text="getLessonProgressLabel(lesson)"></div>
                      </div>
                      <button type="button" class="btn btn-primary btn-sm" @click="completeTextLesson(lesson)">이번 강의 내용 수료하기</button>
                    </div>
                  </div>
                </template>
                <template x-if="lesson.type === 'file'">
                  <div style="display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap; justify-content:space-between;">
                    <div style="display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap;">
                      <a :href="lesson.content" target="_blank" class="file-download-link" @click="markFileOpened(lesson)">
                        📥 <span x-text="lesson.fileName || '파일 다운로드'"></span>
                      </a>
                      <span style="font-size:0.75rem; color:#9ca3af;" x-text="lesson.fileType || ''"></span>
                    </div>
                    <button type="button" class="btn btn-primary btn-sm" @click="completeFileLesson(lesson)">자료 확인 완료</button>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- Pagination -->
          <div x-show="totalPages > 1" style="display:flex; justify-content:center; align-items:center; gap:0.25rem; margin-top:1rem;">
            <button 
              @click="currentPage > 1 ? currentPage-- : null" 
              :disabled="currentPage === 1"
              style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#6b7280; cursor:pointer; border-radius:0.375rem; transition:all 0.15s;"
              :style="currentPage === 1 ? 'opacity:0.3; cursor:not-allowed;' : 'background:#f3f4f6;'"
            >
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
              </svg>
            </button>
            
            <template x-for="page in visiblePages" :key="page">
              <button 
                @click="currentPage = page"
                x-text="page"
                style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; font-size:0.875rem; cursor:pointer; border-radius:0.375rem; transition:all 0.15s;"
                :style="currentPage === page ? 'background:#111827; color:white; font-weight:600;' : 'color:#6b7280; hover:background:#f3f4f6;'"
              ></button>
            </template>
            
            <button 
              @click="currentPage < totalPages ? currentPage++ : null" 
              :disabled="currentPage === totalPages"
              style="width:32px; height:32px; display:flex; align-items:center; justify-content:center; border:none; background:transparent; color:#6b7280; cursor:pointer; border-radius:0.375rem; transition:all 0.15s;"
              :style="currentPage === totalPages ? 'opacity:0.3; cursor:not-allowed;' : 'background:#f3f4f6;'"
            >
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" width="16" height="16">
                <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
              </svg>
            </button>
          </div>

          <!-- Page info -->
          <div x-show="filteredLessons.length > 0" style="text-align:center; margin-top:0.75rem; font-size:0.75rem; color:#9ca3af;">
            <span x-text="filteredLessons.length"></span>개 중 <span x-text="(currentPage - 1) * itemsPerPage + 1"></span>-<span x-text="Math.min(currentPage * itemsPerPage, filteredLessons.length)"></span>개 표시
          </div>
        </div>
      </div>
    </template>

    <!-- Not enrolled / unauthorized -->
    <div x-show="!isLoading && userRole === null" style="text-align:center; padding:4rem 1rem; color:#9ca3af;">
      <div style="font-size:3rem; margin-bottom:0.75rem;">🔒</div>
      <p style="font-size:1.125rem; font-weight:600; color:#374151;">접근 권한이 없습니다</p>
      <p style="margin-top:0.5rem; font-size:0.875rem;">이 강의에 등록된 학생이거나 담당 강사만 접근할 수 있습니다.</p>
      <a href="dashboard.html" class="btn btn-primary" style="display:inline-flex; margin-top:1.5rem; text-decoration:none;">대시보드로 돌아가기</a>
    </div>
    </div>
    
    <!-- Right Sidebar -->
    <div class="sidebar" style="display:none;" :style="window.innerWidth > 1024 ? 'display:block;' : 'display:none;'">
      <!-- Course Progress -->
      <div class="card" x-show="userRole === 'student'" style="margin-bottom:1rem;">
        <div class="card-title">📊 진행 현황</div>
        <div style="text-align:center; padding:1rem;">
          <div style="font-size:2rem; font-weight:700; color:#2563eb;" x-text="getOverallProgressPercent() + '%'"></div>
          <div style="font-size:0.875rem; color:#6b7280; margin-top:0.25rem;">강의 완료율</div>
          <div style="font-size:0.75rem; color:#9ca3af; margin-top:0.5rem;" x-text="getCompletedLessonsCount() + '/' + lessons.length + ' 완료'"></div>
        </div>
      </div>
      
      <!-- Instructor Info -->
      <div class="card" style="margin-bottom:1rem;">
        <div class="card-title">👨‍🏫 강사 정보</div>
        <div style="display:flex; align-items:center; gap:0.75rem; padding:0.5rem;">
          <div style="width:48px; height:48px; border-radius:50%; background:linear-gradient(135deg, #3b82f6, #8b5cf6); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:1.25rem;" x-text="courseInfo?.instructorName?.charAt(0) || '?'"></div>
          <div>
            <div style="font-weight:600; font-size:0.9rem;" x-text="courseInfo?.instructorName || '강사'"></div>
            <div style="font-size:0.75rem; color:#6b7280;">담당 강사</div>
          </div>
        </div>
      </div>
      
      <!-- Quick Links -->
      <div class="card" style="margin-bottom:1rem;">
        <div class="card-title">🚀 바로가기</div>
        <a href="dashboard.html" style="display:flex; align-items:center; gap:0.5rem; padding:0.625rem; border-radius:0.5rem; text-decoration:none; color:#374151; font-size:0.875rem; margin-bottom:0.5rem; transition:all 0.15s;" onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background='transparent'">
          <span>📋</span> 내 강의 목록
        </a>
        <a href="chat.html" style="display:flex; align-items:center; gap:0.5rem; padding:0.625rem; border-radius:0.5rem; text-decoration:none; color:#374151; font-size:0.875rem; transition:all 0.15s;" onmouseover="this.style.background='#f3f4f6'" onmouseout="this.style.background='transparent'">
          <span>💬</span> AI 튜터
        </a>
      </div>
      
      <!-- Recent Notices (Sidebar) -->
      <div class="card">
        <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
          <span>📢 최근 공지</span>
          <span style="font-size:0.75rem; color:#6b7280; cursor:pointer;" @click="showAllNotices = true">더보기</span>
        </div>
        <div x-show="notices.length === 0" style="text-align:center; padding:1rem; color:#9ca3af; font-size:0.875rem;">
          공지사항이 없습니다
        </div>
        <template x-for="notice in notices.slice(0, 3)" :key="notice.id">
          <div style="padding:0.75rem; border-bottom:1px solid #f3f4f6; cursor:pointer;" @click="selectedNotice = notice; showNoticeDetailModal = true;">
            <div style="font-size:0.8rem; font-weight:500; color:#111827; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" x-text="notice.title"></div>
            <div style="font-size:0.7rem; color:#9ca3af; margin-top:0.125rem;" x-text="formatRelativeTime(notice.createdAt)"></div>
          </div>
        </template>
      </div>
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" x-show="showEditModal" x-cloak @click.self="closeEditModal()" x-transition>
    <div class="modal-content" @click.stop>
      <div class="modal-header">
        <h2>강의 수정</h2>
        <button class="icon-button" @click="closeEditModal()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
      <div class="modal-body" style="padding: 1.5rem;">
        <template x-if="editingLesson">
          <div>
            <div class="form-group" style="margin-bottom: 1rem;">
              <label class="form-label">제목</label>
              <input type="text" class="form-input" x-model="editForm.title" placeholder="강의 제목을 입력하세요">
            </div>
            
            <div x-show="editingLesson.type === 'youtube'" class="form-group" style="margin-bottom: 1rem;">
              <label class="form-label">YouTube URL</label>
              <input type="text" class="form-input" x-model="editForm.youtubeUrl" placeholder="https://www.youtube.com/watch?v=...">
            </div>
            
            <div x-show="editingLesson.type === 'text'" class="form-group" style="margin-bottom: 1rem;">
              <label class="form-label">강의 내용</label>
              <textarea class="form-input" x-model="editForm.content" rows="6" placeholder="강의 내용을 입력하세요" style="resize: vertical;"></textarea>
            </div>
            
            <div x-show="editingLesson.type === 'file'" class="form-group" style="margin-bottom: 1rem;">
              <label class="form-label">파일</label>
              <p style="color: #6b7280; font-size: 0.875rem;">파일 타입 강의는 파일을 변경할 수 없습니다. 필요시 삭제 후 재등록해주세요.</p>
            </div>
          </div>
        </template>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" @click="closeEditModal()">취소</button>
        <button class="btn btn-primary" @click="saveEdit()" :disabled="isSubmitting">
          <span x-show="!isSubmitting">저장</span>
          <span x-show="isSubmitting">저장 중...</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Classroom Application -->
  <script type="module">
    import './js/classroom.js?v=202604131845';
    import Alpine from 'https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/module.esm.js';

    window.Alpine = Alpine;

    if (typeof window.classroomApp !== 'function') {
      throw new Error('classroomApp bootstrap failed');
    }

    Alpine.data('classroomApp', window.classroomApp);
    Alpine.start();
  </script>
</body>
</html>
