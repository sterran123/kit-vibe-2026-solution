<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TutorBridge - 커뮤니티</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="/js/responsive-switcher.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import(`/js/community-mobile.js?v=${Date.now()}`).then(() => {
      const s = document.createElement('script');
      s.src = 'https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js';
      s.defer = true;
      document.head.appendChild(s);
    });
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: #f8fafc; padding-bottom: 80px; }
    .safe-area-top { padding-top: env(safe-area-inset-top); }
    .safe-area-bottom { padding-bottom: env(safe-area-inset-bottom); }
    
    /* Post Card */
    .post-card {
      background: white;
      padding: 16px;
      border-bottom: 1px solid #e2e8f0;
    }
    
    .post-card:last-child { border-bottom: none; }
    
    /* Category Chips */
    .category-chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 12px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      font-size: 13px;
      color: #64748b;
      white-space: nowrap;
    }
    
    .category-chip.active {
      background: #3b82f6;
      border-color: #3b82f6;
      color: white;
    }
    
    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: white;
      border-top: 1px solid #e2e8f0;
      padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
      z-index: 50;
    }
    
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #64748b;
      font-size: 11px;
      padding: 4px 12px;
    }
    
    .nav-item.active { color: #3b82f6; }
    .nav-item svg { width: 24px; height: 24px; }
    
    /* Floating Action Button */
    .fab {
      position: fixed;
      bottom: 100px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: #3b82f6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
      z-index: 40;
    }
    
    /* Vote Buttons */
    .vote-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 13px;
      color: #64748b;
    }
    
    .vote-btn.active { color: #3b82f6; background: #eff6ff; }
  </style>
</head>
<body x-data="mobileCommunityApp()" x-init="init()">
  <!-- Header -->
  <div class="sticky top-0 z-40 bg-white/95 backdrop-blur border-b safe-area-top">
    <div class="flex items-center justify-between px-4 py-3">
      <h1 class="text-lg font-bold text-gray-900">커뮤니티</h1>
      <div class="flex items-center gap-1">
        <button @click="showSearch = true" class="p-2">
          <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        </button>
        <button @click="showNotifications = !showNotifications" class="relative p-2" aria-label="알림">
          <svg class="w-6 h-6 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg>
          <span x-show="unreadCount > 0" class="absolute -top-1 -right-1 w-5 h-5 bg-red-500 text-white text-xs rounded-full flex items-center justify-center" x-text="unreadCount"></span>
        </button>
        <a href="settings.html" class="p-2">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-700">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.212 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.184.582-.496.645-.87l.214-1.281z" />
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
        </a>
        <a href="mypage.html" class="w-8 h-8 rounded-full overflow-hidden flex items-center justify-center">
          <img x-show="photoURL" :src="photoURL" class="w-full h-full object-cover" alt="프로필">
          <div x-show="!photoURL" class="w-full h-full rounded-full bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center text-white text-sm font-bold" x-text="user?.displayName?.substring(0,1) || 'U'"></div>
        </a>
      </div>
    </div>
    
    <!-- Category Scroll -->
    <div class="flex gap-2 px-4 py-2 overflow-x-auto scrollbar-hide">
      <button @click="selectedCategory = ''" class="category-chip" :class="{ active: selectedCategory === '' }">전체</button>
      <button @click="filterAnnouncement()" class="category-chip" :class="{ active: selectedCategory === 'announcement' }" style="background:linear-gradient(135deg,#fef3c7,#fde68a);color:#92400e;border-color:#f59e0b;">📢 공지</button>
      <button @click="selectedCategory = 'free'" class="category-chip" :class="{ active: selectedCategory === 'free' }">💬 자유</button>
      <button @click="selectedCategory = 'question'" class="category-chip" :class="{ active: selectedCategory === 'question' }">❓ 질문</button>
      <button @click="showCategoryDrawer = true" class="category-chip" style="background:#f3f4f6;color:#6b7280;">+ 더보기</button>
    </div>
  </div>

  <!-- Post List -->
  <div class="pb-20">
    <div x-show="filteredPosts.length === 0" class="text-center py-16 text-gray-500">
      <svg class="w-16 h-16 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
      <p>게시글이 없습니다</p>
    </div>
    
    <template x-for="post in filteredPosts" :key="post.id">
      <div class="post-card" @click="goToPost(post.id)">
        <div class="flex items-center gap-2 mb-2">
          <span class="px-2 py-1 bg-gray-100 text-gray-600 text-xs rounded-full" x-text="getCategoryName(post.category)"></span>
          <span class="text-xs text-gray-400" x-text="formatDate(post.createdAt)"></span>
        </div>
        
        <h3 class="font-semibold text-gray-900 mb-2 line-clamp-2" x-text="post.title"></h3>
        <p class="text-sm text-gray-600 line-clamp-2 mb-3" x-text="stripHtml(post.content)"></p>
        
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <div class="w-7 h-7 rounded-full bg-gradient-to-br from-blue-400 to-blue-600 flex items-center justify-center text-white text-xs font-bold" x-text="getInitials(post.authorName)"></div>
            <span class="text-sm text-gray-600" x-text="post.authorName"></span>
          </div>
          
          <div class="flex items-center gap-3">
            <button @click.stop="votePost(post.id, 'up')" class="vote-btn" :class="{ active: post.userVote === 'up' }">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7"/></svg>
              <span x-text="post.upvotes || 0"></span>
            </button>
            <div class="flex items-center gap-1 text-gray-400">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
              <span class="text-xs" x-text="post.commentCount || 0"></span>
            </div>
          </div>
        </div>
      </div>
    </template>
  </div>

  <!-- Floating Action Button -->
  <button @click="console.log('FAB clicked'); openWriteModal()" class="fab" style="border:none;cursor:pointer;z-index:100;">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
  </button>

  <!-- Bottom Navigation -->
  <div class="bottom-nav safe-area-bottom">
    <div class="flex justify-around">
      <a href="dashboard-mobile.html" class="nav-item">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        <span>홈</span>
      </a>
      <a href="community-mobile.html" class="nav-item active">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
        <span>커뮤니티</span>
      </a>
      <a href="chat.html" class="nav-item" x-show="showAiTutor">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        <span>AI튜터</span>
      </a>
      <a href="mypage.html" class="nav-item">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
        <span>마이</span>
      </a>
    </div>
  </div>

  <!-- Search Modal -->
  <div x-show="showSearch" class="fixed inset-0 z-50 bg-white" x-transition>
    <div class="flex items-center gap-3 p-4 border-b safe-area-top">
      <div class="flex-1 relative">
        <input x-model="searchQuery" type="text" placeholder="게시글 검색..." class="w-full px-4 py-2 bg-gray-100 rounded-lg text-sm" autofocus>
        <svg class="absolute right-3 top-2.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
      <button @click="showSearch = false; searchQuery = ''" class="text-gray-600 text-sm">취소</button>
    </div>
    <div class="p-4">
      <div x-show="searchQuery && filteredPosts.length === 0" class="text-center py-10 text-gray-500">
        검색 결과가 없습니다
      </div>
    </div>
  </div>

  <!-- Notification Dropdown (PC Style) -->
  <div x-show="showNotifications" @click.away="showNotifications = false" x-transition class="fixed top-14 left-2 right-2 z-50 bg-white rounded-xl shadow-2xl border border-gray-100 overflow-hidden" style="max-height:70vh;">
    <!-- Header -->
    <div class="flex items-center justify-between p-3 border-b border-gray-100 bg-white">
      <h3 class="font-bold text-base text-gray-900">알림</h3>
      <div class="flex items-center gap-2">
        <button x-show="notifications.length > 0" @click.stop="markAllRead()" class="text-xs text-blue-600 hover:text-blue-700 px-2 py-1 rounded hover:bg-blue-50 transition">모두 읽음</button>
        <button @click="showNotifications = false" class="p-1 hover:bg-gray-100 rounded">
          <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
    </div>
    <!-- Content -->
    <div class="overflow-y-auto" style="max-height:calc(70vh - 50px);">
      <div x-show="notifications.length === 0" class="text-center py-8 px-4">
        <svg class="w-10 h-10 mx-auto mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75v-.7V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"/></svg>
        <p class="text-sm text-gray-500">새로운 알림이 없습니다</p>
      </div>
      <template x-for="notification in notifications" :key="notification.id">
        <div class="p-3 border-b border-gray-50 hover:bg-gray-50 transition cursor-pointer" :class="{ 'bg-blue-50/50': !notification.read }" @click="handleNotificationClick(notification)">
          <div class="flex items-start gap-2">
            <div class="flex-shrink-0 w-2 h-2 mt-1.5 rounded-full" :class="notification.read ? 'bg-gray-300' : 'bg-blue-500'"></div>
            <div class="flex-1 min-w-0">
              <p class="text-sm font-medium text-gray-900" x-text="notification.title"></p>
              <p class="text-xs text-gray-600 mt-0.5 line-clamp-2" x-text="notification.message || notification.body || ''"></p>
              <p class="text-xs text-gray-400 mt-1" x-text="formatDate(notification.created_at)"></p>
            </div>
            <button @click.stop="deleteNotification(notification)" class="p-1.5 text-gray-400 hover:text-red-500 hover:bg-red-50 rounded" title="삭제">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
        </div>
      </template>
    </div>
  </div>

  <!-- Category Drawer -->
  <div x-show="showCategoryDrawer" class="fixed inset-0 z-50" x-transition>
    <!-- Backdrop -->
    <div class="absolute inset-0 bg-black/30" @click="showCategoryDrawer = false"></div>
    
    <!-- Drawer Panel -->
    <div class="absolute left-0 top-0 bottom-0 w-64 bg-white shadow-xl" @click.stop>
      <!-- Header -->
      <div class="flex items-center justify-between p-4 border-b safe-area-top">
        <h3 class="font-bold text-lg">게시판 선택</h3>
        <button @click="showCategoryDrawer = false" class="p-1">
          <svg class="w-6 h-6 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      
      <!-- Search Input -->
      <div class="p-3 border-b">
        <div class="relative">
          <input 
            x-model="categorySearch" 
            type="text" 
            placeholder="게시판 검색..." 
            class="w-full px-4 py-2 bg-gray-100 rounded-lg text-sm pl-9"
            autofocus
          >
          <svg class="absolute left-3 top-2.5 w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <button x-show="categorySearch" @click="categorySearch = ''" class="absolute right-3 top-2">
            <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      </div>
      
      <!-- Category List -->
      <div class="p-2 overflow-y-auto" style="max-height:calc(100vh - 140px);">
        <template x-for="cat in filteredCategories" :key="cat.id">
          <button 
            @click="selectCategory(cat.id)" 
            class="w-full flex items-center gap-3 px-4 py-3 rounded-lg text-left transition-colors"
            :class="selectedCategory === cat.id ? 'bg-blue-50 text-blue-700' : 'hover:bg-gray-50 text-gray-700'"
          >
            <span class="text-xl" x-text="cat.icon"></span>
            <span class="font-medium" x-text="cat.name"></span>
            <svg x-show="selectedCategory === cat.id" class="w-5 h-5 ml-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
          </button>
        </template>
      </div>
    </div>
  </div>

  <!-- Write Post Modal -->
  <div x-show="showWriteModal" class="fixed inset-0 z-50 bg-white" x-transition>
    <div class="flex flex-col h-full">
      <!-- Header -->
      <div class="flex items-center justify-between p-4 border-b safe-area-top">
        <button @click="closeWriteModal()" class="text-gray-600">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
        <h2 class="text-lg font-bold">새 글 작성</h2>
        <button @click="createPost()" class="text-blue-600 font-semibold">등록</button>
      </div>
      
      <!-- Form -->
      <div class="flex-1 overflow-y-auto p-4 space-y-4">
        <!-- Category -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">게시판</label>
          <select x-model="postForm.category" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm">
            <option value="free">💬 자유게시판</option>
            <option value="question">❓ 질문게시판</option>
            <option value="attendance">✅ 출석부</option>
            <option value="gallery">🖼️ 갤러리</option>
          </select>
        </div>
        
        <!-- Title -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">제목</label>
          <input x-model="postForm.title" type="text" placeholder="제목을 입력하세요" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm">
        </div>
        
        <!-- Content -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">내용</label>
          <textarea x-model="postForm.content" rows="10" placeholder="내용을 입력하세요" class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-lg text-sm resize-none"></textarea>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
  </div>

  <!-- Search Modal -->
  <div x-show="showSearch" class="fixed inset-0 z-50 bg-white" x-transition>
    <div class="flex items-center gap-3 p-4 border-b safe-area-top">
      <div class="flex-1 relative">
        <input x-model="searchQuery" type="text" placeholder="게시글 검색..." class="w-full px-4 py-2 bg-gray-100 rounded-lg text-sm" autofocus>
        <svg class="absolute right-3 top-2.5 w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      </div>
      <button @click="showSearch = false; searchQuery = ''" class="text-gray-600 text-sm">취소</button>
    </div>
    <div class="p-4">
